<style>
 :root{--bg:#0e0f13;--panel:#16181f;--line:#262a35;--fg:#e6e8ee;--mut:#9aa3b2;--accent:#8ab4ff}
 *{box-sizing:border-box} html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);
   font:14px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
 #app{display:grid;grid-template-columns:1fr 400px;height:100vh}
 #cy{width:100%;height:100%}
 #side{border-left:1px solid var(--line);background:var(--panel);overflow:auto;padding:18px}
 header{position:absolute;top:0;left:0;padding:14px 18px;z-index:5;pointer-events:none}
 h1{font-size:15px;margin:0;font-weight:650} .sub{color:var(--mut);font-size:12px;margin-top:2px}
 #bar{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:5;display:flex;gap:8px}
 #bar input,#bar select{background:var(--panel);border:1px solid var(--line);color:var(--fg);
   border-radius:8px;padding:8px 10px;outline:none;font-size:13px}
 #search{width:min(300px,32vw)}
 #legend{position:absolute;bottom:14px;left:18px;z-index:5;display:flex;flex-wrap:wrap;gap:6px;max-width:60vw}
 .chip{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);
   border-radius:20px;padding:3px 10px;font-size:12px;color:var(--mut);cursor:pointer;user-select:none}
 .chip.off{opacity:.4} .dot{width:10px;height:10px;border-radius:50%}
 #side h2{font-size:17px;margin:.2em 0} .type{display:inline-block;border-radius:6px;padding:2px 8px;
   font-size:11px;font-weight:600;color:#0e0f13} .desc{color:var(--mut);margin:8px 0 12px}
 .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
 .tag{background:#1d2230;border:1px solid var(--line);border-radius:6px;padding:1px 8px;font-size:11px;color:var(--mut)}
 .rel{margin:10px 0} .rel h4{margin:0 0 4px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut)}
 .rel a{display:block;color:var(--accent);cursor:pointer;font-size:13px;padding:1px 0;text-decoration:none}
 .rel a:hover{text-decoration:underline}
 .body{border-top:1px solid var(--line);padding-top:12px;margin-top:12px} .body table{border-collapse:collapse;display:block;overflow:auto}
 .body td,.body th{border:1px solid var(--line);padding:4px 8px} .body code{background:#1d2230;padding:1px 5px;border-radius:4px}
 .body pre{background:#1d2230;padding:10px;border-radius:8px;overflow:auto} .body img{max-width:100%}
 .empty{color:var(--mut)} a{color:var(--accent)}
 .src{pointer-events:auto;color:var(--accent);margin-left:10px;text-decoration:none} .src:hover{text-decoration:underline}
</style></head><body>
<div id="app"><div id="cy"></div><div id="side"><p class="empty">Click a concept to inspect it.</p></div></div>
<header><h1>Storefront · a live OKF bundle</h1><div class="sub">8 concepts · 25 links · OKF v0.1 <a class="src" href="https://github.com/scaccogatto/okf-skills" target="_blank" rel="noopener">source ↗</a></div></header>
<div id="bar">
 <input id="search" placeholder="search concepts…">
 <select id="type"><option value="">all types</option></select>
 <select id="layout">
  <option value="cose">force</option><option value="concentric">concentric</option>
  <option value="breadthfirst">breadth-first</option><option value="circle">circle</option><option value="grid">grid</option>
 </select>

<script>
const NODES=[{"id": "datasets/orders-db", "type": "Schema", "title": "Orders database", "description": "Postgres schema of record for orders, line items, and charge attempts.", "tags": ["postgres", "schema", "data"], "group": "datasets", "sz": 28, "body": "# Overview\n\nThe system of record written by [Orders API](/services/orders-api.md) and\n[Payments API](/services/payments-api.md). Orders move through a strict status\nmachine; charge attempts are append-only so refunds and retries stay auditable.\n\n# Tables\n\n| Table          | Key            | Notes                                   |\n|----------------|----------------|-----------------------------------------|\n| `orders`       | `id`           | One row per checkout; carries `status`. |\n| `line_items`   | `id`           | FK \u2192 `orders.id`; product + quantity.   |\n| `charges`      | `id`           | FK \u2192 `orders.id`; append-only attempts. |\n\n# Order status\n\n```\npending \u2500\u2500\u25b6 paid \u2500\u2500\u25b6 fulfilled\n   \u2502                    \u2502\n   \u2514\u2500\u2500\u25b6 failed          \u2514\u2500\u2500\u25b6 refunded\n```\n\n# Invariants\n\n* An order in `paid` has exactly one successful `charges` row.\n* `charges` is never updated in place \u2014 voids/refunds insert new rows."}, {"id": "decisions/event-driven", "type": "Decision", "title": "Event-driven service communication", "description": "Services publish domain events instead of calling each other's side effects directly.", "tags": ["adr", "architecture", "events"], "group": "decisions", "sz": 27, "body": "# Context\n\nEarly on, [Orders API](/services/orders-api.md) called email, analytics, and\ninventory inline at checkout. Each new consumer made checkout slower and more\nfragile \u2014 one slow dependency failed the whole order.\n\n# Decision\n\nServices own their data and publish **domain events** (`order.paid`,\n`order.failed`) to a broker. Consumers subscribe; producers never know who\nlistens. [Payments API](/services/payments-api.md) stays a synchronous call\nbecause checkout cannot complete without a charge result.\n\n# Consequences\n\n* New consumers attach without touching the checkout path.\n* Eventual consistency is now an explicit, documented trade-off.\n* Each service needs an idempotent event handler."}, {"id": "decisions/use-okf", "type": "Decision", "title": "Adopt OKF for shared knowledge", "description": "Use the Open Knowledge Format as the single, portable home for project knowledge.", "tags": ["adr", "knowledge", "process"], "group": "decisions", "sz": 26, "body": "# Context\n\nKnowledge about our systems was scattered across wikis, code comments, and\npeople's heads. Agents and humans both needed a single, durable source.\n\n# Decision\n\nAdopt OKF: a `.okf/` bundle of markdown + YAML frontmatter, versioned with the\ncode it describes. See the [Auth API](/services/auth-api.md) concept for an\nexample of a code-derived entry.\n\n# Consequences\n\n* Knowledge is diffable, portable, and readable without tooling.\n* No vendor lock-in; no required runtime.\n* Curation happens in pull requests, like code."}, {"id": "metrics/checkout-conversion", "type": "Metric", "title": "Checkout conversion", "description": "Share of started checkouts that end in a paid order.", "tags": ["kpi", "growth", "payments"], "group": "metrics", "sz": 27, "body": "# Definition\n\n```\ncheckout_conversion = orders[status = paid] / checkouts_started\n```\n\nMeasured per hour from the [Orders API](/services/orders-api.md) checkout funnel;\nthe denominator is `checkout.started` events, the numerator is `order.paid`.\n\n# Targets\n\n| Window  | Target | Page on-call below |\n|---------|--------|--------------------|\n| Hourly  | \u2265 96%  | 90%                |\n| 28-day  | \u2265 98%  | \u2014                  |\n\n# Watch-outs\n\nA sudden drop usually means failed charges in\n[Payments API](/services/payments-api.md), not buyer behaviour \u2014 start with the\n[Payment failures runbook](/runbooks/payment-failures.md) before assuming a\nfunnel regression."}, {"id": "runbooks/payment-failures", "type": "Runbook", "title": "Payment failures runbook", "description": "Diagnose and mitigate a spike in declined or failed charges.", "tags": ["oncall", "payments", "incident"], "group": "runbooks", "sz": 29, "body": "# Trigger\n\nCharge success rate (tracked by the\n[Checkout conversion metric](/metrics/checkout-conversion.md)) drops below 95%\nfor 5 minutes, or `order.failed` events spike.\n\n# Diagnose\n\n1. Check [Payments API](/services/payments-api.md) `/healthz` and processor\n   status page \u2014 is this us or upstream?\n2. Tail charge attempts in the [Orders database](/datasets/orders-db.md):\n   ```sql\n   SELECT decline_code, count(*) FROM charges\n   WHERE created_at > now() - interval '15 min' AND status = 'failed'\n   GROUP BY 1 ORDER BY 2 DESC;\n   ```\n3. A single dominant `decline_code` \u2192 processor-side. Many varied codes \u2192 likely\n   our integration (expired key, bad idempotency).\n\n# Mitigate\n\n* **Processor outage:** enable the queue-and-retry flag; orders go `pending`, not\n  `failed`, and drain when the processor recovers.\n* **Expired signing key:** rotate via [Auth API](/services/auth-api.md) and\n  redeploy Payments.\n\n# Verify\n\nSuccess rate recovers above 99% and the `pending` backlog drains to zero."}, {"id": "services/auth-api", "type": "Service", "title": "Auth API", "description": "Issues and verifies short-lived JWTs for every Storefront service.", "tags": ["auth", "security", "platform"], "group": "services", "sz": 29, "body": "# Overview\n\nStateless HTTP service that issues signed JWTs and verifies them for the rest of\nthe platform. It is the trust root for [Orders API](/services/orders-api.md) and\n[Payments API](/services/payments-api.md): both reject any request whose token\nthis service did not sign. Knowledge here is derived from the service source and\nits README \u2014 a worked example of the [OKF adoption decision](/decisions/use-okf.md).\n\n# Endpoints\n\n| Method | Path      | Description                                  |\n|--------|-----------|----------------------------------------------|\n| `POST` | `/token`  | Exchange credentials for a short-lived JWT.  |\n| `POST` | `/verify` | Validate a JWT and return its claims.        |\n| `POST` | `/revoke` | Add a token's `jti` to the deny list.        |\n\n# Claims\n\n```json\n{ \"sub\": \"user_42\", \"scope\": [\"orders:write\", \"payments:read\"], \"exp\": 1718360000 }\n```\n\nTokens live 15 minutes; clients refresh against `/token`. Signing keys rotate\nweekly and are pinned by `kid` in the JWT header.\n\n# Citations\n\n[1] [Service README](https://github.com/acme/storefront/tree/main/services/auth)"}, {"id": "services/orders-api", "type": "Service", "title": "Orders API", "description": "Owns the order lifecycle \u2014 cart checkout, fulfilment, and refunds.", "tags": ["orders", "checkout", "platform"], "group": "services", "sz": 31, "body": "# Overview\n\nThe heart of the storefront. Authenticates callers through the\n[Auth API](/services/auth-api.md), charges them through the\n[Payments API](/services/payments-api.md), and persists state to the\n[Orders database](/datasets/orders-db.md). It emits domain events rather than\ncalling downstream consumers directly \u2014 see the\n[event-driven decision](/decisions/event-driven.md).\n\n# Endpoints\n\n| Method | Path                 | Description                                |\n|--------|----------------------|--------------------------------------------|\n| `POST` | `/orders`            | Create an order from a cart and charge it. |\n| `GET`  | `/orders/{id}`       | Fetch an order and its line items.         |\n| `POST` | `/orders/{id}/refund`| Refund an order (full or partial).         |\n\n# Checkout flow\n\n1. Verify the caller's token (`scope: orders:write`).\n2. Reserve stock and write a `pending` order to the\n   [Orders database](/datasets/orders-db.md).\n3. Call [Payments API](/services/payments-api.md) `POST /charges`.\n4. On success, mark the order `paid` and publish `order.paid`.\n\nThis conversion funnel is tracked by the\n[Checkout conversion metric](/metrics/checkout-conversion.md).\n\n# Events\n\n| Event         | When                          |\n|---------------|-------------------------------|\n| `order.paid`  | Payment captured successfully |\n| `order.failed`| Charge declined or timed out  |"}, {"id": "services/payments-api", "type": "Service", "title": "Payments API", "description": "Captures charges and refunds via the upstream payment processor.", "tags": ["payments", "money", "platform"], "group": "services", "sz": 29, "body": "# Overview\n\nWraps the third-party payment processor behind a stable internal contract. Called\nsynchronously by the [Orders API](/services/orders-api.md) during checkout, it\nauthenticates the caller through the [Auth API](/services/auth-api.md) and records\nevery charge attempt in the [Orders database](/datasets/orders-db.md). Like the\nrest of the platform it follows the\n[event-driven decision](/decisions/event-driven.md) for downstream notification.\n\n# Endpoints\n\n| Method | Path                | Description                               |\n|--------|---------------------|-------------------------------------------|\n| `POST` | `/charges`          | Capture a charge for an order.            |\n| `POST` | `/charges/{id}/void`| Void or refund a prior charge.            |\n| `POST` | `/webhooks/processor`| Ingest processor status callbacks.       |\n\n# Idempotency\n\nEvery `POST /charges` requires an `Idempotency-Key` header (the order id). Retries\nwith the same key return the original result rather than double-charging \u2014 the\nsingle most important invariant in the service.\n\n# Operations\n\nWhen charge success rate drops, follow the\n[Payment failures runbook](/runbooks/payment-failures.md)."}], EDGES=[{"source": "datasets/orders-db", "target": "services/orders-api"}, {"source": "datasets/orders-db", "target": "services/payments-api"}, {"source": "decisions/event-driven", "target": "services/orders-api"}, {"source": "decisions/event-driven", "target": "services/payments-api"}, {"source": "decisions/use-okf", "target": "services/auth-api"}, {"source": "metrics/checkout-conversion", "target": "services/orders-api"}, {"source": "metrics/checkout-conversion", "target": "services/payments-api"}, {"source": "metrics/checkout-conversion", "target": "runbooks/payment-failures"}, {"source": "runbooks/payment-failures", "target": "metrics/checkout-conversion"}, {"source": "runbooks/payment-failures", "target": "services/payments-api"}, {"source": "runbooks/payment-failures", "target": "datasets/orders-db"}, {"source": "runbooks/payment-failures", "target": "services/auth-api"}, {"source": "services/auth-api", "target": "services/orders-api"}, {"source": "services/auth-api", "target": "services/payments-api"}, {"source": "services/auth-api", "target": "decisions/use-okf"}, {"source": "services/orders-api", "target": "services/auth-api"}, {"source": "services/orders-api", "target": "services/payments-api"}, {"source": "services/orders-api", "target": "datasets/orders-db"}, {"source": "services/orders-api", "target": "decisions/event-driven"}, {"source": "services/orders-api", "target": "metrics/checkout-conversion"}, {"source": "services/payments-api", "target": "services/orders-api"}, {"source": "services/payments-api", "target": "services/auth-api"}, {"source": "services/payments-api", "target": "datasets/orders-db"}, {"source": "services/payments-api", "target": "decisions/event-driven"}, {"source": "services/payments-api", "target": "runbooks/payment-failures"}];
const PALETTE=["#6E56CF","#D97757","#22C55E","#3B82F6","#EAB308","#EC4899","#14B8A6","#F97316","#A855F7","#0EA5E9","#84CC16","#EF4444","#64748B"];
const byId=Object.fromEntries(NODES.map(n=>[n.id,n]));
const outL={}, inL={};
NODES.forEach(n=>{outL[n.id]=[];inL[n.id]=[];});
EDGES.forEach(e=>{outL[e.source].push(e.target);inL[e.target].push(e.source);});
const types=[...new Set(NODES.map(n=>n.type))].sort();
const color=Object.fromEntries(types.map((t,i)=>[t,PALETTE[i%PALETTE.length]]));
const off=new Set();
const cy=cytoscape({container:document.getElementById('cy'),minZoom:.2,maxZoom:1.6,wheelSensitivity:.2,
 elements:[...NODES.map(n=>({data:{...n,c:color[n.type]}})),...EDGES.map(e=>({data:e}))],
 style:[
  {selector:'node',style:{'background-color':'data(c)','label':'data(title)','color':'#e6e8ee',
   'font-size':10,'text-wrap':'wrap','text-max-width':120,'text-valign':'bottom','text-margin-y':4,
   'text-outline-width':2,'text-outline-color':'#0e0f13','min-zoomed-font-size':6,
   'width':'data(sz)','height':'data(sz)'}},
  {selector:'edge',style:{'width':1.2,'line-color':'#3a4150','target-arrow-color':'#3a4150',
   'target-arrow-shape':'triangle','arrow-scale':.8,'curve-style':'bezier','opacity':.7}},
  {selector:'.dim',style:{'opacity':.10}},{selector:'.hl',style:{'border-width':3,'border-color':'#fff'}}
 ],
 layout:{name:'breadthfirst',animate:false,nodeRepulsion:9000,idealEdgeLength:90,padding:40}});
const side=document.getElementById('side');
const esc=s=>(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function relList(title,arr){if(!arr.length)return'';
 return `<div class="rel"><h4>${title}</h4>${arr.map(id=>`<a data-go="${esc(id)}">${esc((byId[id]||{}).title||id)}</a>`).join('')}</div>`;}
function show(id){const n=byId[id];if(!n)return;const c=color[n.type];
 side.innerHTML=`<span class="type" style="background:${c}">${esc(n.type)}</span>
 <h2>${esc(n.title)}</h2><div class="desc">${esc(n.description)||'<span class=empty>no description</span>'}</div>
 <div class="tags">${(n.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>
 ${relList('Links to',outL[id])}${relList('Cited by',inL[id])}
 <div class="body">${n.body?marked.parse(n.body):'<span class=empty>empty body</span>'}</div>`;
 side.querySelectorAll('[data-go]').forEach(a=>a.onclick=()=>select(a.getAttribute('data-go')));}
function select(id){const ele=cy.getElementById(id);if(!ele.length)return;show(id);
 cy.elements().removeClass('hl').addClass('dim');const nb=ele.closedNeighborhood();nb.removeClass('dim');ele.addClass('hl');
 cy.animate({center:{eles:ele},duration:250});
 try{if(decodeURIComponent((location.hash||'').slice(1))!==id)location.hash=encodeURIComponent(id);}catch(e){}}
cy.on('tap','node',e=>select(e.target.id()));
cy.on('tap',e=>{if(e.target===cy)cy.elements().removeClass('dim hl');});
function applyFilter(){const q=document.getElementById('search').value.toLowerCase();const ty=document.getElementById('type').value;
 cy.nodes().forEach(n=>{const d=n.data();
  const m=(!q||(d.title+' '+d.type+' '+d.description+' '+(d.tags||[]).join(' ')).toLowerCase().includes(q))
        &&(!ty||d.type===ty)&&!off.has(d.type);
  n.style('display',m?'element':'none');});}
document.getElementById('search').oninput=applyFilter;
document.getElementById('type').oninput=applyFilter;
const tysel=document.getElementById('type');types.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;tysel.appendChild(o);});
document.getElementById('layout').onchange=e=>{cy.layout({name:e.target.value,animate:true,padding:40,
 nodeRepulsion:9000,idealEdgeLength:90}).run();};
document.getElementById('legend').innerHTML=types.map(t=>`<span class="chip" data-t="${esc(t)}"><span class="dot" style="background:${color[t]}"></span>${esc(t)} (${NODES.filter(n=>n.type===t).length})</span>`).join('');
document.querySelectorAll('#legend .chip').forEach(ch=>ch.onclick=()=>{const t=ch.getAttribute('data-t');
 if(off.has(t)){off.delete(t);ch.classList.remove('off');}else{off.add(t);ch.classList.add('off');}applyFilter();});
document.getElementById('layout').value='breadthfirst';
const Q=new URLSearchParams(location.search),QL=Q.get('layout'),QS=Q.get('select');
if(QL&&[...document.querySelectorAll('#layout option')].some(o=>o.value===QL)){document.getElementById('layout').value=QL;cy.layout({name:QL,animate:false,padding:40,nodeRepulsion:9000,idealEdgeLength:90}).run();}
function fromHash(){try{const h=decodeURIComponent((location.hash||'').slice(1));if(h&&byId[h])select(h);}catch(e){}}
addEventListener('hashchange',fromHash);
if(QS&&byId[QS])select(QS);else fromHash();
</script></body></html>
